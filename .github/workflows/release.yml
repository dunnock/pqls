name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Pack
        run: tar -czf pqls-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release pqls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqls-linux-x86_64
          path: pqls-linux-x86_64.tar.gz

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Pack
        run: tar -czf pqls-linux-aarch64.tar.gz -C target/aarch64-unknown-linux-gnu/release pqls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqls-linux-aarch64
          path: pqls-linux-aarch64.tar.gz

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Pack
        run: tar -czf pqls-darwin-x86_64.tar.gz -C target/x86_64-apple-darwin/release pqls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqls-darwin-x86_64
          path: pqls-darwin-x86_64.tar.gz

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Pack
        run: tar -czf pqls-darwin-aarch64.tar.gz -C target/aarch64-apple-darwin/release pqls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqls-darwin-aarch64
          path: pqls-darwin-aarch64.tar.gz

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Pack
        run: Compress-Archive -Path target/x86_64-pc-windows-msvc/release/pqls.exe -DestinationPath pqls-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqls-windows-x86_64
          path: pqls-windows-x86_64.zip

  release:
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos-x86_64
      - build-macos-aarch64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pqls-linux-x86_64.tar.gz
            artifacts/pqls-linux-aarch64.tar.gz
            artifacts/pqls-darwin-x86_64.tar.gz
            artifacts/pqls-darwin-aarch64.tar.gz
            artifacts/pqls-windows-x86_64.zip
            install.sh

  publish:
    needs:
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
